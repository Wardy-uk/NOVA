<table cellspacing="0" cellpadding="0" border="0" width="100%">
	<tr>
		<th style="padding:0;">
			<table bgcolor="$Contact.GetBrandSetting('footerBackground')" width="100%" border="0" cellpadding="0" cellspacing="0">

					<th style="padding:40px 20px">
						<table cellpadding="0" cellspacing="0" border="0" width="100%">
							<tr>
								<th width="100%" style="padding-right:20px" valign="bottom" class="column padding10">
									<table cellspacing="0" cellpadding="0" border="0" width="100%">
										<tr>
											<th style="text-align:center;padding-bottom:20px;font-family:$Contact.GetBrandSetting('fontFamily');font-size:18px;color: $Contact.GetBrandSetting('footerText');">
												Need to get in touch?
											</th>
										</tr>
										<tr>
											<th style="font-weight:normal;text-align:center;padding-bottom:10px;font-family:$Contact.GetBrandSetting('fontFamily');font-size:16px;line-height:18px;color: $Contact.GetBrandSetting('footerText');">
												<span style="font-weight:bold">A:</span> $Contact.GetBrandSetting('footerText2')
											</th>
										</tr>
										<tr>
											<th style="padding-bottom:15px;">
												<table cellpadding="0" cellspacing="0" border="0" width="100%">
													<tr>
														<th style="padding:0;">
															<table cellpadding="0" cellspacing="0" border="0" align="center" class="width100">
																<tr>
																	<th align="center">
																		<table cellpadding="0" cellspacing="0" border="0" align="center">
																			<tr>
																				<th class="column sidebar15" style="padding-bottom:10px;text-align:center;font-family:$Contact.GetBrandSetting('fontFamily');font-size:16px;line-height:18px;color: $Contact.GetBrandSetting('footerText');">
																					<span style="font-weight:bold">T:</span> <a href="tel:$Contact.GetBrandSetting('companyPhone')" style="text-decoration:none;font-weight:normal;color: $Contact.GetBrandSetting('footerText');">$Contact.GetBrandSetting('companyPhone')</a>
																				</th>
																			</tr>
																			<tr>
																				<th class="column" style="padding-right:0px;text-align:center;padding:0px;font-family:$Contact.GetBrandSetting('fontFamily');font-size:16px;line-height:18px;color: $Contact.GetBrandSetting('footerText');">
																					<span style="font-weight:bold">E:</span> <a href="${Link.Counted(" mailto:$Contact.GetBrandSetting('companyEmail')")}" style="text-decoration:none;font-weight:normal;color: $Contact.GetBrandSetting('footerText');">$Contact.GetBrandSetting('companyEmail')</a>
																				</th>
																			</tr>
																		</table>
																	</th>
																</tr>
															</table>
														</th>

													</tr>
												</table>
											</th>
										</tr>
									</table>
								</th>
								
							</tr>
						</table>
					</th>
				</tr>
			</table>
		</th>
